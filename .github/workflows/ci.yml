name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cookery
          POSTGRES_PASSWORD: cookery
          POSTGRES_DB: cookery_notes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cookery"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://cookery:cookery@localhost:5432/cookery_notes_test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Run CI
        run: bin/ci
